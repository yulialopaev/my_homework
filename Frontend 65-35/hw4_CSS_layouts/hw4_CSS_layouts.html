<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Task 1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            width: 100%;
            height: 140px;
            border: 2px solid darkslategray;
            position: relative;
        }

        .block {
            width: 40%;
            height: 100px;
            position: absolute;
            top: 20px;
            text-align: center;
            line-height: 100px;

        }
        .left_block {
            left: 20px;
            background-color: deeppink;
        }


        .right_block {
            right: 20px;
            background-color: greenyellow;
        }

        .square_200 {
            width: 200px;
            height: 200px;
            border: 2px solid coral;
            background-color: #e74c3c;
            position: relative;
            text-align: center;
            color: white;
            margin: 50px auto 0 auto;

        }

        .square_100 {
            width: 100px;
            height: 100px;
            border: 2px solid darkblue;
            background-color: #3498db;
            position: absolute;
            top: 100px;
            left: 100px;
            text-align: center;
            padding-top: 10px;
            box-sizing: border-box;
        }

        .main_square {
            width: 500px;
            height: 500px;
            border: 2px solid black;
            background-color: darkgreen;
            position: relative;
            text-align: center;
            color: white;
            margin: 50px auto 200px auto;

        }

        .overlaps_square {
            width: 350px;
            height: 350px;
            border: 2px solid forestgreen;
            background-color: #2ecc71;
            position: absolute;
            top: 250px;
            right: 250px;
            text-align: center;
            padding-top: 10px;
            box-sizing: border-box;

        }

        .square_300 {
            width: 300px;
            height: 300px;
            border: 2px solid black;
            background-color: #e74c3c;
            position: relative;
            text-align: center;
            color: white;
            margin: 50px auto 50px auto;

        }

        .square_150 {
            width: 150px;
            height: 150px;
            background-color: #3498db;
            position: absolute;
            top: 75px;
            left: 75px;
            text-align: center;
            padding-top: 10px;
            box-sizing: border-box;
        }

        <hr>
    </style>
</head>
<body>

<div class="container">
    <div class="block left_block">Left block</div>
    <div class="block right_block">Right block</div>
</div>
<hr>
<div class="square_200">
    The BIG square
    <div class="square_100">The SMALL square</div>
</div>
<hr>
<div class="main_square">
    The MAIN square
    <div class="overlaps_square">The OVERLAPS square</div>
</div>
<hr>
<div class="square_300">
    The BIG RED square
    <div class="square_150">The SMALL square</div>
</div>
</body>
</html>
