<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Task 4</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
        }

        .square_200 {
            width: 200px;
            height: 200px;
            border: 2px solid black;
            background-color: #e74c3c;
            position: relative;
            text-align: center;
            color: white;
            margin: 50px auto 0 auto;

        }

        .square_100 {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            position: absolute;
            top: 100px;
            left: 100px;
            text-align: center;
            padding-top: 10px;
            box-sizing: border-box;
        }

    </style>
</head>
<body>

<div class="square_200">
    The BIG RED square
    <div class="square_100">The SMALL square</div>
</div>
